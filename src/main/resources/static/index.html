<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUD Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>MUD Game</h1>
        </header>
        
        <main class="game-main">
            <div class="game-status">
                <div class="status-item">
                    <span class="status-label">Health:</span>
                    <span id="health" class="status-value">100/100</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Damage:</span>
                    <span id="damage" class="status-value">20</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Room:</span>
                    <span id="room" class="status-value">Start Room</span>
                </div>
            </div>
            
            <div class="game-output" id="game-output">
                <div class="output-line">Welcome to the MUD Game!</div>
                <div class="output-line">Type 'help' for a list of commands.</div>
            </div>
            
            <div class="game-input">
                <input type="text" id="command-input" placeholder="Enter command...">
                <button id="submit-btn">Submit</button>
            </div>
            
            <div class="game-actions">
                <button class="action-btn" data-command="look">Look</button>
                <button class="action-btn" data-command="go">Go</button>
                <button class="action-btn" data-command="attack">Attack</button>
                <button class="action-btn" data-command="status">Status</button>
                <button class="action-btn" data-command="help">Help</button>
                <button class="action-btn" data-command="quit">Quit</button>
            </div>
            
            <div class="direction-buttons" id="direction-buttons" style="display: none;">
                <button class="direction-btn" data-direction="north">North</button>
                <button class="direction-btn" data-direction="south">South</button>
                <button class="direction-btn" data-direction="east">East</button>
                <button class="direction-btn" data-direction="west">West</button>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
